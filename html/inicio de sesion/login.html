<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universidad de colima</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="stylesheet" href="/styles/indexstyle.css">
    <link rel="stylesheet" href="/styles/bodyfix.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-success p-0 pt-3 pb-3">
      <div class="container-fluid">
        <h2 class="navbar-brand">Universidad de colima | Inicio de sesion</h2>
      </div>
    </nav>
  <main>
    <div class="card mx-auto">
      <h5 class="card-header">Inicio de sesión</h5>
      <div class="card-body">
        <form id="login-form">
          <div class="mb-3">
            <label for="tipo">Tipo de usuario</label>
            <select id="tipo" class="form-select">
              <option value="alumno">Alumno</option>
              <option value="maestro">Maestro</option>
              <option value="admin">Administrador</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="nombre">Nombre</label>
            <input type="text" class="form-control" id="nombre" />
          </div>
          <div class="mb-3">
            <label for="contrasena">Contraseña</label>
            <input type="password" class="form-control" id="contrasena" />
          </div>
          <button type="submit" class="btn btn-success">Ingresar</button>
        </form>
      </div>
    </div>
  </main>
    <script src="scripts/login.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
</body>
</html>
